name: Build & Release

# يعمل تلقائياً عند رفع وسم إصدار جديد مثل v0.1.0 أو v1.2.3
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish to GitHub Releases
        env:
          # توكن يوفّره GitHub تلقائياً — لا تضيف شيئاً يدوياً
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish
